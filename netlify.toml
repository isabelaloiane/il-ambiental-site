[build]
  command = "npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/il-ambiental-site run build"
  publish = "artifacts/il-ambiental-site/dist/public"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redireciona /api/contact para a Netlify Function
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

# SPA fallback — todas as rotas vão para index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
