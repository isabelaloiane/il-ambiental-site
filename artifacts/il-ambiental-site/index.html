<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#452816" />
    <meta name="description" content="Licenciamento ambiental no Pará com agilidade e segurança jurídica. A IL Ambiental cuida de LP, LI e LO junto à SEMAS-PA e IBAMA. Fale conosco." />
    <meta property="og:title" content="IL Ambiental | Engenharia e Consultoria Ambiental" />
    <meta property="og:description" content="Sua empresa em conformidade ambiental com quem conhece o Pará. Licenciamento, gestão e consultoria ambiental." />
    <meta property="og:type" content="website" />
    <title>IL Ambiental | Engenharia e Consultoria Ambiental</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-submarca.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-submarca.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      function animateCounter(element, target, duration) {
        duration = duration || 1800;
        var start = 0;
        var step = target / (duration / 16);
        var prefix = element.dataset.prefix || "";
        var suffix = element.dataset.suffix || "";
        var timer = setInterval(function () {
          start += step;
          if (start >= target) {
            element.textContent = prefix + target + suffix;
            clearInterval(timer);
          } else {
            element.textContent = prefix + Math.floor(start) + suffix;
          }
        }, 16);
      }

      var counterObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            var el = entry.target;
            animateCounter(el, parseInt(el.dataset.target));
            counterObserver.unobserve(el);
          }
        });
      }, { threshold: 0.5 });

      function observeCounters() {
        document.querySelectorAll(".stat-number[data-target]:not([data-observed])").forEach(function (el) {
          el.dataset.observed = "1";
          counterObserver.observe(el);
        });
      }

      // Run on initial load
      document.addEventListener("DOMContentLoaded", observeCounters);

      // Re-run only when React adds new DOM nodes (SPA navigation), not on text changes
      var domWatcher = new MutationObserver(function (mutations) {
        var hasNewNodes = mutations.some(function (m) { return m.addedNodes.length > 0; });
        if (hasNewNodes) observeCounters();
      });
      domWatcher.observe(document.body, { childList: true, subtree: true });
    </script>

    <!-- AOS.js -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>
      // ─── INICIALIZA AOS ───────────────────────────────────────────────
      document.addEventListener('DOMContentLoaded', function () {
        AOS.init({
          duration: 600,
          easing: 'ease-out',
          once: true,
          offset: 80
        });

        // ─── NAVBAR COM FUNDO AO ROLAR ───────────────────────────────────
        var navbar = document.querySelector('nav, header, .navbar, .nav');
        if (navbar) {
          window.addEventListener('scroll', function () {
            if (window.scrollY > 60) {
              navbar.classList.add('scrolled');
            } else {
              navbar.classList.remove('scrolled');
            }
          });
        }

        // ─── FAQ COM ANIMAÇÃO ────────────────────────────────────────────
        document.querySelectorAll('.faq-question').forEach(function (question) {
          question.addEventListener('click', function () {
            var item = question.closest('.faq-item');
            var isOpen = item.classList.contains('open');
            document.querySelectorAll('.faq-item').forEach(function (i) { i.classList.remove('open'); });
            if (!isOpen) item.classList.add('open');
          });
        });
      });
    </script>
  </body>
</html>
